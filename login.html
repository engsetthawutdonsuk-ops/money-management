    <script>
    /* ===== DEVICE DETECTION ===== */
    (function() {
        function detectDevice() {
            var w = window.innerWidth;
            var ua = navigator.userAgent || '';
            var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            var isMobileUA = /Android|iPhone|iPod|Opera Mini|IEMobile|WPDesktop/i.test(ua);
            var isTabletUA = /iPad|tablet|Kindle|Silk/i.test(ua) || (isTouchDevice && w >= 600 && w <= 1200);
            var device = 'desktop';
            if (w <= 480 || (isMobileUA && w <= 768)) device = 'phone';
            else if (w <= 1024 || isTabletUA) device = 'tablet';
            else if (w <= 1440) device = 'laptop';
            var b = document.documentElement;
            b.classList.remove('device-phone','device-tablet','device-laptop','device-desktop');
            b.classList.add('device-' + device);
            if (isTouchDevice) b.classList.add('is-touch');
            else b.classList.remove('is-touch');
        }
        detectDevice();
        window.addEventListener('resize', detectDevice);
        window.addEventListener('orientationchange', function(){ setTimeout(detectDevice, 150); });
    })();
    </script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #a5b4fc;
            --primary-dark: #4338ca;
            --accent: #ec4899;
            --accent-light: #f9a8d4;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f0f4ff;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.08);
            --radius: 16px;
            --gradient-1: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gradient-2: linear-gradient(135deg, #ec4899, #f43f5e);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(99,102,241,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(236,72,153,0.1) 0%, transparent 50%);
            z-index: -1;
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0,0); }
            50% { transform: translate(-20px, -20px); }
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 48px 32px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            margin-bottom: 28px;
        }

        /* Couple illustration */
        .couple-icon {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 0;
            margin-bottom: 16px;
            position: relative;
            height: 90px;
        }
        .couple-icon .person {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            box-shadow: 0 3px 12px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .couple-icon .person.him {
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            transform: translateX(10px);
        }
        .couple-icon .person.her {
            background: linear-gradient(135deg, #fce7f3, #fbcfe8);
            transform: translateX(-10px);
        }
        .couple-icon .heart-center {
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
        }
        .couple-icon .heart-center svg {
            filter: drop-shadow(0 2px 6px rgba(236, 72, 153, 0.4));
            animation: heartPulse 2s ease-in-out infinite;
        }
        @keyframes heartPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .logo-text h1 {
            font-size: 1.7rem;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .logo-text p {
            font-size: 0.92rem;
            color: var(--text-light);
            margin-bottom: 0;
        }

        .tagline {
            font-size: 0.78rem;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        .login-description {
            color: var(--text-light);
            font-size: 0.88rem;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .google-login-btn {
            width: 100%;
            padding: 14px 20px;
            background: white;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .google-login-btn:hover {
            background: #f9fafb;
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .google-login-btn:active {
            transform: translateY(0);
            box-shadow: var(--shadow);
        }

        .google-icon {
            width: 20px;
            height: 20px;
            background: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjQiIGhlaWdodD0iMjQiIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cGF0aCBkPSJNMjIuNTYgMTIuMjVjMCAuNzgtLjA3IDEuNTMtLjIgMi4yNUgxMnY0LjI2aDUuOTJjLS4yNiAxLjM3LTEuMDQgMi41My0yLjIxIDMuMzF2Mi43N2g3LjU3YzIuMDgtMi4zIDMuMjgtNS43IDMuMjgtOS41OXoiIGZpbGw9IiM0Mzg1RjMiLz48cGF0aCBkPSJNMTIgMjNjMi45NyAwIDUuNDYtLjk4IDcuMjgtMi42NmwyLjc3LTIuNzdjLTIuMS0xLjM3LTMuMDEtMy41NS0zLjAxLTUuNzZIMTJWMjNoLS4wMnYtNGgtNi4zN3YtNC4yNkg1LjkyYzAtMi4yLjktNC4zNyAyLjEtNS43Ni0yLjA4LTEuMzctMy4yOC01LjctMy4yOC05LjU5IDAtMi4yLjg5LTQuMzcgMi4wNy01Ljc2em0tNi4zNyAxLjc4YzEuMTcgLjc4IDEuOTUtMS45NiAyLjIxLTMuMzFIMi4zNXYtLjI2eiIgZmlsbD0iIzM0QTg1M3IvPjwvc3ZnPg==') no-repeat center;
            background-size: contain;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(99, 102, 241, 0.3);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            display: none;
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer-text {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 24px;
            text-align: center;
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        /* Loading state */
        .google-login-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .google-login-btn.loading span {
            display: none;
        }

        .google-login-btn.loading .loading-spinner {
            display: block;
        }

        /* ===== DEVICE-ADAPTIVE STYLES ===== */

        /* Phone */
        @media (max-width: 480px) {
            .login-container { padding: 12px; }
            .login-card { padding: 32px 20px; }
            .couple-icon { height: 76px; }
            .couple-icon .person { width: 48px; height: 48px; }
            .couple-icon .person svg { width: 34px; height: 34px; }
            .couple-icon .heart-center svg { width: 30px; height: 30px; }
            .logo-text h1 { font-size: 1.4rem; }
            .logo-text p { font-size: 0.85rem; }
            .login-description { font-size: 0.82rem; margin-bottom: 20px; }
            .google-login-btn { padding: 16px 20px; font-size: 1rem; min-height: 52px; }
            .footer-text { font-size: 0.75rem; }
        }

        /* Tablet: centered card, wider */
        @media (min-width: 481px) and (max-width: 1024px) {
            .login-container { max-width: 440px; }
            .login-card { padding: 42px 32px; }
            .google-login-btn { min-height: 50px; }
        }

        /* Desktop/Laptop: card shadow + hover effect */
        @media (min-width: 1025px) {
            .login-container { max-width: 460px; }
            .login-card {
                padding: 52px 40px;
                transition: transform 0.3s, box-shadow 0.3s;
            }
            .login-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 20px 40px -10px rgba(0,0,0,0.12);
            }
        }

        /* Touch devices: bigger button */
        .is-touch .google-login-btn { min-height: 52px; }

        /* iOS safe area */
        @supports (padding: env(safe-area-inset-top)) {
            body {
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
            }
        }
    </style>
</head>
<body>

    <script>
        const firebaseConfig = window.FIREBASE_CONFIG;

        if (!firebaseConfig || !firebaseConfig.apiKey) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.style.display = 'block';
            errorMessage.textContent = 'Firebase configuration is missing. Please update firebase-config.js.';
            throw new Error('Missing firebase config');
        }

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const btnText = document.getElementById('btnText');
        const errorMessage = document.getElementById('errorMessage');
        let loginDone = false;

        function goToApp(user) {
            if (loginDone) return;
            loginDone = true;
            localStorage.setItem('user_uid', user.uid);
            localStorage.setItem('user_email', user.email);
            localStorage.setItem('user_name', user.displayName || '');
            localStorage.setItem('user_photo', user.photoURL || '');
            window.location.href = 'index.html';
        }

        function showError(msg) {
            errorMessage.style.display = 'block';
            errorMessage.style.background = '#fee2e2';
            errorMessage.style.color = '#991b1b';
            errorMessage.textContent = msg;
            googleLoginBtn.classList.remove('loading');
        }

        // Did user arrive from logout?
        const cameFromLogout = sessionStorage.getItem('logged_out') === 'true';
        if (cameFromLogout) {
            sessionStorage.removeItem('logged_out');
            auth.signOut().catch(() => {});
        }

        // ALWAYS listen for auth state — this is the most reliable way
        // It fires when: page loads with existing session, redirect completes, popup completes,
        // or user comes back to this tab after auth completed in another tab
        auth.onAuthStateChanged((user) => {
            if (user && !cameFromLogout) {
                goToApp(user);
            }
        });

        // Also handle redirect result explicitly (for Android)
        auth.getRedirectResult().then((result) => {
            if (result && result.user) {
                goToApp(result.user);
            }
        }).catch(() => {});

        // CRITICAL for mobile Safari: when user completes auth in another tab and comes back,
        // the page may have been suspended. This re-checks auth when the tab becomes visible.
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && !loginDone && !cameFromLogout) {
                // Force Firebase to re-check the auth state
                const user = auth.currentUser;
                if (user) {
                    goToApp(user);
                } else {
                    // Auth state might not be ready yet, reload to re-trigger onAuthStateChanged
                    auth.onAuthStateChanged((u) => {
                        if (u) goToApp(u);
                    });
                }
            }
        });

        // Also re-check on window focus (some browsers fire this but not visibilitychange)
        window.addEventListener('focus', () => {
            if (!loginDone && !cameFromLogout) {
                const user = auth.currentUser;
                if (user) {
                    goToApp(user);
                }
            }
        });

        // Login button click
        googleLoginBtn.addEventListener('click', () => {
            errorMessage.style.display = 'none';
            googleLoginBtn.classList.add('loading');

            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });

            // Try popup first on all platforms — it's the most direct method
            auth.signInWithPopup(provider).then((result) => {
                goToApp(result.user);
            }).catch((error) => {
                console.error('Login error:', error);

                // If popup fails, try redirect as fallback
                if (error.code === 'auth/popup-blocked' ||
                    error.code === 'auth/disallowed-useragent' ||
                    error.code === 'auth/operation-not-supported-in-this-environment') {
                    // Popup not available — use redirect
                    auth.signInWithRedirect(provider).catch((e) => {
                        showError('Error: ' + e.message);
                    });
                } else if (error.code === 'auth/popup-closed-by-user' || error.code === 'auth/cancelled-popup-request') {
                    showError('Login cancelled. Please try again.');
                } else if (error.code === 'auth/unauthorized-domain') {
                    showError('Domain not authorized in Firebase Console.');
                } else {
                    showError('Error: ' + error.message);
                }
            });
        });
    </script>
