<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💑 Money Management - Login</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Money Mgmt">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <!-- Firebase Auth -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #a5b4fc;
            --primary-dark: #4338ca;
            --accent: #ec4899;
            --accent-light: #f9a8d4;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f0f4ff;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.08);
            --radius: 16px;
            --gradient-1: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gradient-2: linear-gradient(135deg, #ec4899, #f43f5e);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(99,102,241,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(236,72,153,0.1) 0%, transparent 50%);
            z-index: -1;
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0,0); }
            50% { transform: translate(-20px, -20px); }
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 48px 32px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            margin-bottom: 24px;
        }

        .logo-icon {
            font-size: 3.5rem;
            margin-bottom: 12px;
        }

        .logo-text h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .logo-text p {
            font-size: 0.95rem;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        .login-description {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .google-login-btn {
            width: 100%;
            padding: 14px 20px;
            background: white;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .google-login-btn:hover {
            background: #f9fafb;
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .google-login-btn:active {
            transform: translateY(0);
            box-shadow: var(--shadow);
        }

        .google-icon {
            width: 20px;
            height: 20px;
            background: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjQiIGhlaWdodD0iMjQiIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cGF0aCBkPSJNMjIuNTYgMTIuMjVjMCAuNzgtLjA3IDEuNTMtLjIgMi4yNUgxMnY0LjI2aDUuOTJjLS4yNiAxLjM3LTEuMDQgMi41My0yLjIxIDMuMzF2Mi43N2g3LjU3YzIuMDgtMi4zIDMuMjgtNS43IDMuMjgtOS41OXoiIGZpbGw9IiM0Mzg1RjMiLz48cGF0aCBkPSJNMTIgMjNjMi45NyAwIDUuNDYtLjk4IDcuMjgtMi42NmwyLjc3LTIuNzdjLTIuMS0xLjM3LTMuMDEtMy41NS0zLjAxLTUuNzZIMTJWMjNoLS4wMnYtNGgtNi4zN3YtNC4yNkg1LjkyYzAtMi4yLjktNC4zNyAyLjEtNS43Ni0yLjA4LTEuMzctMy4yOC01LjctMy4yOC05LjU5IDAtMi4yLjg5LTQuMzcgMi4wNy01Ljc2em0tNi4zNyAxLjc4YzEuMTcgLjc4IDEuOTUtMS45NiAyLjIxLTMuMzFIMi4zNXYtLjI2eiIgZmlsbD0iIzM0QTg1M3IvPjwvc3ZnPg==') no-repeat center;
            background-size: contain;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(99, 102, 241, 0.3);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            display: none;
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer-text {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 24px;
            text-align: center;
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        /* Loading state */
        .google-login-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .google-login-btn.loading span {
            display: none;
        }

        .google-login-btn.loading .loading-spinner {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">💑</div>
                <div class="logo-text">
                    <h1>Money Management</h1>
                    <p>Track spending together</p>
                </div>
            </div>

            <div class="divider"></div>

            <div class="login-description">
                Secure login with your Google Account.
                <br>Your financial data stays private and secure.
            </div>

            <div id="errorMessage" class="error-message"></div>

            <button id="googleLoginBtn" class="google-login-btn">
                <svg class="google-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0 .78-.07 1.53-.2 2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-2.3 3.28-5.7 3.28-9.59z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span id="btnText">Sign in with Google</span>
                <div class="loading-spinner"></div>
            </button>

            <div class="footer-text">
                By signing in, you agree to our<br>
                <a href="#" onclick="alert('Privacy Policy will be here'); return false;">Privacy Policy</a> and <a href="#" onclick="alert('Terms of Service will be here'); return false;">Terms of Service</a>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = window.FIREBASE_CONFIG;

        if (!firebaseConfig || !firebaseConfig.apiKey) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.style.display = 'block';
            errorMessage.textContent = 'Firebase configuration is missing. Please update firebase-config.js.';
            throw new Error('Missing firebase config');
        }

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const errorMessage = document.getElementById('errorMessage');
        let loginDone = false;

        function onLoginSuccess(user) {
            if (loginDone) return;
            loginDone = true;
            localStorage.setItem('user_uid', user.uid);
            localStorage.setItem('user_email', user.email);
            localStorage.setItem('user_name', user.displayName || '');
            localStorage.setItem('user_photo', user.photoURL || '');
            window.location.href = 'index.html';
        }

        // Did user arrive here from logout?
        const cameFromLogout = sessionStorage.getItem('logged_out') === 'true';
        if (cameFromLogout) {
            sessionStorage.removeItem('logged_out');
            // Sign out any leftover session so user can pick a different account
            auth.signOut().catch(() => {});
        } else {
            // NOT from logout: check for redirect result AND listen for auth state
            // Both run in parallel — whichever detects the user first wins

            // 1) Check redirect result (for return from Google sign-in)
            auth.getRedirectResult().then((result) => {
                if (result && result.user) {
                    onLoginSuccess(result.user);
                }
            }).catch((error) => {
                if (error.code) {
                    errorMessage.style.display = 'block';
                    if (error.code === 'auth/unauthorized-domain') {
                        errorMessage.textContent = 'Domain not authorized. Add this domain in Firebase Console > Authentication > Settings.';
                    } else if (error.code === 'auth/operation-not-allowed') {
                        errorMessage.textContent = 'Google sign-in is not enabled in Firebase Console.';
                    } else {
                        errorMessage.textContent = 'Error: ' + error.message;
                    }
                    console.error('Redirect error:', error);
                }
            });

            // 2) Listen for auth state (catches both redirect result AND existing session)
            auth.onAuthStateChanged((user) => {
                if (user) {
                    onLoginSuccess(user);
                }
            });
        }

        // Login button — redirect with account chooser
        googleLoginBtn.addEventListener('click', async () => {
            try {
                errorMessage.style.display = 'none';
                googleLoginBtn.classList.add('loading');

                const provider = new firebase.auth.GoogleAuthProvider();
                provider.setCustomParameters({ prompt: 'select_account' });
                await auth.signInWithRedirect(provider);
            } catch (error) {
                googleLoginBtn.classList.remove('loading');
                errorMessage.style.display = 'block';
                if (error.code === 'auth/disallowed-useragent') {
                    errorMessage.textContent = 'Please open this page in Safari or Chrome (not in-app browser).';
                } else {
                    errorMessage.textContent = 'Error: ' + error.message;
                }
                console.error('Login error:', error);
            }
        });
    </script>
</body>
</html>
